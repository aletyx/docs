		marker-end="url(#arrowhead)" />

	<!-- Arrowhead marker -->
	<defs>
		<marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
			<polygon points="0 0, 10 3.5, 0 7" fill="#666" />
		</marker>
	</defs>

	<!-- Aletyx Enterprise Label -->
	<rect x="520" y="35" width="230" height="30" rx="15" ry="15" fill="#b7b2b2" stroke="#16293F" stroke-width="2" />
	<text x="635" y="50" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle"
		fill="#16293F">Aletyx Enterprise Exclusive</text>
