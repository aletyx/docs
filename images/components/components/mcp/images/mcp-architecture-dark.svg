		Business Impact Analysis</text>

	<!-- Data Flow Arrows -->
	<path d="M400,200 L400,230" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrowhead)" />
	<path d="M400,390 L400,420" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrowhead)" />

	<!-- Bidirectional Flow -->
	<path d="M180,200 C180,215 80,215 80,230" stroke="#0288d1" stroke-width="1.5" fill="none"
		marker-end="url(#arrowhead)" />
	<path d="M80,270 C80,255 180,255 180,240" stroke="#f57f17" stroke-width="1.5" fill="none"
		marker-end="url(#arrowhead)" />

	<path d="M620,200 C620,215 720,215 720,230" stroke="#0288d1" stroke-width="1.5" fill="none"
		marker-end="url(#arrowhead)" />
	<path d="M720,270 C720,255 620,255 620,240" stroke="#f57f17" stroke-width="1.5" fill="none"
		marker-end="url(#arrowhead)" />

	<!-- Integration Line -->
	<path d="M155,380 C155,400 155,420 155,460" stroke="#2e7d32" stroke-width="1.5" stroke-dasharray="5,3" fill="none"
		marker-end="url(#arrowhead)" />
	<path d="M400,380 C400,400 325,420 325,460" stroke="#2e7d32" stroke-width="1.5" stroke-dasharray="5,3" fill="none"
		marker-end="url(#arrowhead)" />
	<path d="M400,380 C400,400 495,420 495,460" stroke="#2e7d32" stroke-width="1.5" stroke-dasharray="5,3" fill="none"
		marker-end="url(#arrowhead)" />
