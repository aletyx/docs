<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <!-- Background -->
  <rect width="300" height="300" fill="#1f1f1f" rx="15" ry="15" />
  
  <!-- Main container -->
  <rect x="20" y="20" width="260" height="260" fill="#2a2a2a" rx="10" ry="10" stroke="#444444" stroke-width="2" />
  
  <!-- Event Bus (Central Component) -->
  <rect x="70" y="130" width="160" height="40" rx="5" ry="5" fill="#FC764C" stroke="#FC764C" stroke-width="2" />
  <text x="150" y="155" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#1f1f1f">Event Bus</text>
  
  <!-- Producer Services (Top) -->
  <rect x="50" y="50" width="80" height="40" rx="5" ry="5" fill="#1f1f1f" stroke="#FC764C" stroke-width="2" />
  <text x="90" y="75" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#e0e0e0">Producer 1</text>
  
  <rect x="170" y="50" width="80" height="40" rx="5" ry="5" fill="#1f1f1f" stroke="#FC764C" stroke-width="2" />
  <text x="210" y="75" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#e0e0e0">Producer 2</text>
  
  <!-- Consumer Services (Bottom) -->
  <rect x="50" y="210" width="80" height="40" rx="5" ry="5" fill="#1f1f1f" stroke="#FC764C" stroke-width="2" />
  <text x="90" y="235" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#e0e0e0">Consumer 1</text>
  
  <rect x="170" y="210" width="80" height="40" rx="5" ry="5" fill="#1f1f1f" stroke="#FC764C" stroke-width="2" />
  <text x="210" y="235" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#e0e0e0">Consumer 2</text>
  
  <!-- Events (Connecting Lines) -->
  <line x1="90" y1="90" x2="90" y2="130" stroke="#e0e0e0" stroke-width="2" />
  <line x1="210" y1="90" x2="210" y2="130" stroke="#e0e0e0" stroke-width="2" />
  <line x1="90" y1="170" x2="90" y2="210" stroke="#e0e0e0" stroke-width="2" />
  <line x1="210" y1="170" x2="210" y2="210" stroke="#e0e0e0" stroke-width="2" />
  
  <!-- Envelope Icons (Events) -->
  <!-- Producer 1 to Event Bus -->
  <g transform="translate(90, 110) scale(0.7)">
    <rect x="-15" y="-10" width="30" height="20" fill="#1f1f1f" stroke="#FC764C" stroke-width="2" />
    <polygon points="-15,-10 0,0 15,-10" fill="none" stroke="#FC764C" stroke-width="2" />
  </g>
  
  <!-- Producer 2 to Event Bus -->
  <g transform="translate(210, 110) scale(0.7)">
    <rect x="-15" y="-10" width="30" height="20" fill="#1f1f1f" stroke="#FC764C" stroke-width="2" />
    <polygon points="-15,-10 0,0 15,-10" fill="none" stroke="#FC764C" stroke-width="2" />
  </g>
  
  <!-- Event Bus to Consumer 1 -->
  <g transform="translate(90, 190) scale(0.7)">
    <rect x="-15" y="-10" width="30" height="20" fill="#1f1f1f" stroke="#FC764C" stroke-width="2" />
    <polygon points="-15,-10 0,0 15,-10" fill="none" stroke="#FC764C" stroke-width="2" />
  </g>
  
  <!-- Event Bus to Consumer 2 -->
  <g transform="translate(210, 190) scale(0.7)">
    <rect x="-15" y="-10" width="30" height="20" fill="#1f1f1f" stroke="#FC764C" stroke-width="2" />
    <polygon points="-15,-10 0,0 15,-10" fill="none" stroke="#FC764C" stroke-width="2" />
  </g>
</svg>