<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 124 124">
	<style>
		/* Dark mode styles */
		.icon-primary {
			fill: #FC764C;
		}

		.icon-secondary {
			fill: #e0e0e0;
		}

		.icon-highlight {
			stroke: #e0e0e0;
		}

		.icon-background {
			fill: #413f3f;
		}

		.icon-container {
			filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.3));
		}
	</style>

	<!-- COMPLIANCE ICON -->
	<g class="icon-container" transform="translate(62, 62)">
		<circle class="icon-background" cx="0" cy="0" r="60" />

		<!-- Rulebook -->
		<path class="icon-primary" d="M10,-35 h40 v70 h-40 v-70 z" />
		<path class="icon-highlight" d="M20,-25 h20 M20,-15 h20 M20,-5 h20" stroke-width="3" />

		<!-- Scales of Justice -->
		<g transform="translate(-25, 0)">
			<!-- Central pillar -->
			<rect class="icon-secondary" x="-3" y="-35" width="6" height="50" />

			<!-- Scale beam -->
			<rect class="icon-secondary" x="-25" y="-35" width="50" height="6" />

			<!-- Scale pans - more prominent -->
			<circle class="icon-secondary" cx="-20" cy="-15" r="12" />
			<circle class="icon-secondary" cx="20" cy="-15" r="12" />

			<!-- Weight indicators -->
			<circle fill="#413f3f" cx="-20" cy="-15" r="5" />
			<circle fill="#413f3f" cx="20" cy="-15" r="5" />

			<!-- Connecting chains - more visible -->
			<line x1="-20" y1="-35" x2="-20" y2="-27" stroke="#e0e0e0" stroke-width="3" />
			<line x1="20" y1="-35" x2="20" y2="-27" stroke="#e0e0e0" stroke-width="3" />

			<!-- Base -->
			<rect class="icon-secondary" x="-15" y="15" width="30" height="10" />
		</g>
	</g>
</svg>
