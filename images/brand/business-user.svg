<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" class="no-dark-filter">
	<!-- Business User with Decision and Process Focus -->
	<style>
		.navy {
			fill: #000000;
		}

		.blue {
			fill: #1a1a1a;
		}

		.orange {
			fill: #FC764C;
		}

		.white {
			fill: #FFFFFF;
		}
	</style>

	<!-- Main circular background -->
	<circle cx="50" cy="50" r="35" class="navy" />

	<!-- Decision diamond -->
	<path d="M50,20 L70,50 L50,80 L30,50 Z" class="blue" />

	<!-- Process Flows -->
	<path d="M50,30 L65,30 Q70,30 70,35 L70,45 Q70,50 65,50 L35,50 Q30,50 30,55 L30,65 Q30,70 35,70 L50,70" fill="none"
		stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" />

	<!-- Decision point markers -->
	<circle cx="50" cy="30" r="4" class="orange" />
	<circle cx="50" cy="70" r="4" class="orange" />
	<circle cx="70" cy="50" r="4" class="orange" />
	<circle cx="30" cy="50" r="4" class="orange" />

	<!-- Central icon representing both concepts -->
	<rect x="43" y="43" width="14" height="14" rx="2" class="white" />
	<line x1="46" y1="47" x2="54" y2="47" stroke="#000000" stroke-width="1.5" />
	<line x1="46" y1="50" x2="54" y2="50" stroke="#000000" stroke-width="1.5" />
	<line x1="46" y1="53" x2="54" y2="53" stroke="#000000" stroke-width="1.5" />
</svg>
