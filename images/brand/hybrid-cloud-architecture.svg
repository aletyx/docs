<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <!-- Background -->
  <rect width="300" height="300" fill="#FFFFFF" rx="15" ry="15" />
  
  <!-- Main container -->
  <rect x="20" y="20" width="260" height="260" fill="#f8f9fa" rx="10" ry="10" stroke="#e0e0e0" stroke-width="2" />
  
  <!-- Public Cloud Section -->
  <rect x="40" y="40" width="100" height="100" rx="8" ry="8" fill="#FFFFFF" stroke="#000000" stroke-width="2" />
  <text x="90" y="60" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#000000">Public Cloud</text>
  
  <!-- Public Cloud Icons -->
  <circle cx="65" cy="85" r="15" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="2" />
  <text x="65" y="89" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#1a1a1a">VM</text>
  
  <circle cx="115" cy="85" r="15" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="2" />
  <text x="115" y="89" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#1a1a1a">DB</text>
  
  <path d="M40,110 Q90,130 140,110" fill="none" stroke="#1a1a1a" stroke-width="2" />
  
  <!-- Private Data Center Section -->
  <rect x="160" y="40" width="100" height="100" rx="8" ry="8" fill="#FFFFFF" stroke="#000000" stroke-width="2" />
  <text x="210" y="60" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#000000">Private DC</text>
  
  <!-- Private DC Icons -->
  <rect x="175" y="75" width="30" height="20" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="2" />
  <rect x="180" y="95" width="20" height="5" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="2" />
  
  <rect x="215" y="75" width="30" height="20" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="2" />
  <rect x="220" y="95" width="20" height="5" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="2" />
  
  <path d="M160,110 Q210,130 260,110" fill="none" stroke="#1a1a1a" stroke-width="2" />
  
  <!-- Integration & Management Layer -->
  <rect x="40" y="160" width="220" height="60" rx="8" ry="8" fill="#000000" stroke="#000000" stroke-width="2" />
  <text x="150" y="190" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#FFFFFF">Hybrid Integration Layer</text>
  
  <!-- Connecting Lines -->
  <line x1="90" y1="140" x2="90" y2="160" stroke="#1a1a1a" stroke-width="2" stroke-dasharray="5,5" />
  <line x1="210" y1="140" x2="210" y2="160" stroke="#1a1a1a" stroke-width="2" stroke-dasharray="5,5" />
  
  <!-- Bottom Icons - Devices/Users -->
  <circle cx="90" cy="240" r="15" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="2" />
  <text x="90" y="245" font-family="Arial, sans-serif" font-size="15" text-anchor="middle" fill="#1a1a1a">👤</text>
  
  <circle cx="150" cy="240" r="15" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="2" />
  <text x="150" y="243" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#1a1a1a">📱</text>
  
  <circle cx="210" cy="240" r="15" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="2" />
  <text x="210" y="243" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#1a1a1a">💻</text>
  
  <!-- Connecting Lines to Devices -->
  <line x1="90" y1="220" x2="90" y2="225" stroke="#1a1a1a" stroke-width="2" />
  <line x1="150" y1="220" x2="150" y2="225" stroke="#1a1a1a" stroke-width="2" />
  <line x1="210" y1="220" x2="210" y2="225" stroke="#1a1a1a" stroke-width="2" />
</svg>