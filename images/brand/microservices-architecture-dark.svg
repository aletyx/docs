<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <!-- Background -->
  <rect width="300" height="300" fill="#1f1f1f" rx="15" ry="15" />
  
  <!-- Main container -->
  <rect x="20" y="20" width="260" height="260" fill="#2a2a2a" rx="10" ry="10" stroke="#444444" stroke-width="2" />
  
  <!-- Microservices - Top Row -->
  <rect x="50" y="50" width="60" height="60" rx="5" ry="5" fill="#1f1f1f" stroke="#FC764C" stroke-width="2" />
  <text x="80" y="85" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#e0e0e0">Service 1</text>
  
  <rect x="120" y="50" width="60" height="60" rx="5" ry="5" fill="#1f1f1f" stroke="#FC764C" stroke-width="2" />
  <text x="150" y="85" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#e0e0e0">Service 2</text>
  
  <rect x="190" y="50" width="60" height="60" rx="5" ry="5" fill="#1f1f1f" stroke="#FC764C" stroke-width="2" />
  <text x="220" y="85" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#e0e0e0">Service 3</text>
  
  <!-- Microservices - Bottom Row -->
  <rect x="50" y="190" width="60" height="60" rx="5" ry="5" fill="#1f1f1f" stroke="#FC764C" stroke-width="2" />
  <text x="80" y="225" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#e0e0e0">Service 4</text>
  
  <rect x="120" y="190" width="60" height="60" rx="5" ry="5" fill="#1f1f1f" stroke="#FC764C" stroke-width="2" />
  <text x="150" y="225" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#e0e0e0">Service 5</text>
  
  <rect x="190" y="190" width="60" height="60" rx="5" ry="5" fill="#1f1f1f" stroke="#FC764C" stroke-width="2" />
  <text x="220" y="225" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#e0e0e0">Service 6</text>
  
  <!-- API Gateway -->
  <rect x="120" y="120" width="60" height="60" rx="5" ry="5" fill="#FC764C" stroke="#FC764C" stroke-width="2" />
  <text x="150" y="155" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#1f1f1f">API Gateway</text>
  
  <!-- Connecting Lines -->
  <!-- From top services to API Gateway -->
  <line x1="80" y1="110" x2="120" y2="140" stroke="#e0e0e0" stroke-width="2" />
  <line x1="150" y1="110" x2="150" y2="120" stroke="#e0e0e0" stroke-width="2" />
  <line x1="220" y1="110" x2="180" y2="140" stroke="#e0e0e0" stroke-width="2" />
  
  <!-- From API Gateway to bottom services -->
  <line x1="120" y1="160" x2="80" y2="190" stroke="#e0e0e0" stroke-width="2" />
  <line x1="150" y1="180" x2="150" y2="190" stroke="#e0e0e0" stroke-width="2" />
  <line x1="180" y1="160" x2="220" y2="190" stroke="#e0e0e0" stroke-width="2" />
</svg>