<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" class="no-dark-filter">
	<!-- Developer Icon - Fixed to remove coffee cup and avoid lock appearance -->
	<style>
		.navy {
			fill: #000000;
		}

		.blue {
			fill: #1a1a1a;
		}

		.orange {
			fill: #FC764C;
		}

		.black {
			fill: #111111;
		}
	</style>

	<!-- Monitor shape more like Image 1 -->
	<rect x="15" y="20" width="70" height="55" rx="8" class="navy" />
	<rect x="20" y="25" width="60" height="45" rx="4" class="black" />

	<!-- Code syntax highlighting bars - matching colors in Image 1 -->
	<rect x="25" y="35" width="15" height="5" fill="#4EC9B0" />
	<rect x="40" y="35" width="30" height="5" fill="#9CDCFE" />

	<rect x="25" y="45" width="40" height="5" fill="#569CD6" />

	<rect x="25" y="55" width="20" height="5" fill="#CE9178" />

	<rect x="25" y="65" width="45" height="5" fill="#C586C0" />

	<!-- Keyboard -->
	<rect x="30" y="80" width="40" height="8" rx="3" class="blue" />

	<!-- Orange accent element on right side -->
	<rect x="75" y="30" width="5" height="25" rx="2" class="orange" />
</svg>
