    <!-- Cookie Consent Script -->
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const cookieConsent = document.getElementById("cookieConsent");
        const acceptBtn = document.getElementById("acceptCookies");
        const declineBtn = document.getElementById("declineCookies");
        const settingsBtn = document.getElementById("cookieSettings");

        // Check if user already made a choice
        const cookieChoice = localStorage.getItem("cookieConsent");

        // If no choice was made yet, show the banner
        if (!cookieChoice) {
          cookieConsent.style.display = "block";
        }

        // Handle accept button click
        acceptBtn.addEventListener("click", function () {
          localStorage.setItem("cookieConsent", "accepted");
          cookieConsent.style.display = "none";
          initializeAnalytics();
        });

        // Handle decline button click
        declineBtn.addEventListener("click", function () {
          localStorage.setItem("cookieConsent", "declined");
          cookieConsent.style.display = "none";
        });

        // Settings button (you could expand this to show more detailed cookie options)
        settingsBtn.addEventListener("click", function () {
          // Here you could show a more detailed modal with granular consent options
          alert(
            "This site uses Google Analytics to understand how visitors use our site. You can accept all cookies or decline analytics cookies."
          );
        });
      });
    </script>
